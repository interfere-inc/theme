name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run validate
      - run: bun run build
      - run: bun run check # fail if committed artifacts are out of date

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: sigstore/cosign-installer@v3

      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile
      - run: bun run build

      # OIDC trusted publishing (no token) + npm provenance attestation
      - run: npm publish --provenance --access public

      # Keyless-sign the package tarball with cosign (Fulcio/Rekor via OIDC)
      - name: cosign sign tarball
        run: |
          TARBALL="$(npm pack | tail -1)"
          cosign sign-blob --yes "$TARBALL" \
            --bundle "$TARBALL.cosign.bundle"
          gh release upload "${{ github.event.release.tag_name }}" \
            "$TARBALL" "$TARBALL.cosign.bundle" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
